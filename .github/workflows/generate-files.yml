name: Generate files.json

on:
  push:
    branches:
      - main
    paths:
      - 'assets/**'   # ← 対象フォルダだけで発火

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.json
        run: |
          echo "[" > files.json
          find assets -type f | sed 's/^/"/' | sed 's/$/",/' >> files.json
          sed -i '$ s/,$//' files.json
          echo "]" >> files.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add files.json
          git commit -m "auto: update files.json" || echo "No changes"
          git push
